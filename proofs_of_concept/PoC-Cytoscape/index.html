<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PoC — Cytoscape.js Phylogenetic Tree Demo</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        font-family: system-ui, -apple-system, Arial;
      }
      #toolbar {
        padding: 8px;
        background: #f6f8fa;
        border-bottom: 1px solid #e1e4e8;
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #cy {
        width: 100%;
        height: calc(100% - 50px);
        display: block;
      }
      button {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #d0d7de;
        background: #fff;
        cursor: pointer;
      }
      button:active {
        transform: translateY(1px);
      }
    </style>
  </head>
  <body>
    <div id="toolbar">
      <button id="fitBtn">Fit</button>
      <button id="layoutBtn">Run layout</button>
      <button id="resetBtn">Reset zoom</button>
      <label style="margin-left: 8px">Load Newick:</label>
      <input
        id="newickFile"
        type="file"
        accept=".nw,.newick,.tree,text/plain"
      />
      <label style="margin-left: 8px">Render:</label>
      <select id="renderMode">
        <option value="dendrogram">Dendrogram (preset)</option>
        <option value="graph">Graph (breadthfirst)</option>
        <option value="phylogram">Phylogram (branch lengths)</option>
        <option value="cose" selected>Force-directed (cose)</option>
      </select>
      <button
        id="mstToggle"
        title="Toggle Minimum Spanning Tree"
        style="margin-left: 8px"
      >
        Toggle MST
      </button>
      <label style="margin-left: 8px"
        ><input type="checkbox" id="showEdgeLabels" /> Edge labels</label
      >
      <label style="margin-left: 8px"
        ><input type="checkbox" id="minimalInternalNodes" checked /> Minimal
        internal nodes</label
      >
      <div style="margin-left: 12px; color: #444">
        Phylogenetic tree demo — Cytoscape.js
      </div>
    </div>

    <div id="cy"></div>

    <!-- Cytoscape.js from CDN -->
    <script src="https://unpkg.com/cytoscape@3.23.0/dist/cytoscape.min.js"></script>
    <script src="js/newick.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
